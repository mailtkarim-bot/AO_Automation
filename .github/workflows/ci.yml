name: CI — Batião Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: batiao
          POSTGRES_PASSWORD: batiao
          POSTGRES_DB: batiao
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg://batiao:batiao@localhost:5432/batiao
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://batiao:batiao@localhost:5432/batiao
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/
