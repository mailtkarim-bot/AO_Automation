name: CI — Batião Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Verify Alembic config exists
        run: |
          test -f alembic.ini && echo "Alembic OK" || echo "Missing alembic.ini"
          test -d alembic/versions && ls alembic/versions/*.py && echo "Migrations OK"

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          echo "Syntax OK"
