name: CI — Batião Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: batiao
          POSTGRES_PASSWORD: batiao
          POSTGRES_DB: batiao
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Verify Alembic config exists
        run: |
          test -f alembic.ini && echo "Alembic OK" || echo "Missing alembic.ini"

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          echo "Syntax OK"
